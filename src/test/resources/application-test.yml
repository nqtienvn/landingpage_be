spring:
  cache:
    type: simple
  datasource:
    url: jdbc:h2:mem:landing_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

cloudinary:
  cloud-name: test
  api-key: test
  api-secret: test

app:
  security:
    jwt-secret: test-local-dev-secret-test-local-dev-secret
    jwt-expiration-minutes: 30
  cors:
    allowed-origins: http://localhost:5173
  admin:
    username: admin
    password: admin123
    email: admin@test.local

payos:
  client-id: test_client_id
  api-key: test_api_key
  checksum-key: test_checksum_key
  return-url: http://localhost:5173/payment/success
  cancel-url: http://localhost:5173/payment/cancel
