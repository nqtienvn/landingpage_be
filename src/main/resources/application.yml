spring:
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
    redis:
      time-to-live: 10m
      cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/landing}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dh0qn5xbk}
  api-key: ${CLOUDINARY_API_KEY:566142855211874}
  api-secret: ${CLOUDINARY_API_SECRET:7PEptOfzIYrVAC7dpcnJBK2K1TQ}

app:
  security:
    jwt-secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
    email: ${ADMIN_EMAIL:admin@bloomecho.local}

