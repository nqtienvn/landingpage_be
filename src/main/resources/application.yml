spring:
  config:
    import: optional:file:.env[.properties]
  cache:
    type: ${SPRING_CACHE_TYPE}
    redis:
      time-to-live: ${SPRING_CACHE_REDIS_TIME_TO_LIVE}
      cache-null-values: ${SPRING_CACHE_REDIS_CACHE_NULL_VALUES}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_REDIS_SSL_ENABLED:false}
      repositories:
        enabled: ${SPRING_DATA_REDIS_REPOSITORIES_ENABLED}
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      max-lifetime: 240000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    properties:
      hibernate:
        default_batch_fetch_size: ${JPA_DEFAULT_BATCH_FETCH_SIZE:50}
    show-sql: ${JPA_SHOW_SQL}
    open-in-view: ${JPA_OPEN_IN_VIEW}

server:
  port: ${SERVER_PORT:8080}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  return-url: ${PAYOS_RETURN_URL}
  cancel-url: ${PAYOS_CANCEL_URL}

app:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
    email: ${ADMIN_EMAIL}

open:
  api:
    title: ${OPEN_API_TITLE}
    version: ${OPEN_API_VERSION}
    description: ${OPEN_API_DESCRIPTION}
    url: ${OPEN_API_URL}
    description-server-url: ${OPEN_API_DESCRIPTION_SERVER_URL}
